<script>
function dodajZastep() {
    let container = document.getElementById("zastepy");
    let numer = document.querySelectorAll(".zastep-box").length + 1;

    let box = document.createElement("div");
    box.className = "zastep-box";

    box.innerHTML = `
<h4>Zastęp ${numer}</h4>
<label>Pojazd</label><input type="text" class="pojazd">
<label>Kierowca</label><input type="text" class="kierowca" list="obsada_list">
<label>Dowódca</label><input type="text" class="dowodca" list="obsada_list">
<label>R1</label><input type="text" class="r1" list="obsada_list">
<label>Pomocnik R1</label><input type="text" class="pr1" list="obsada_list">
<label>R2</label><input type="text" class="r2" list="obsada_list">
<label>Pomocnik R2</label><input type="text" class="pr2" list="obsada_list">
`;
    container.appendChild(box);
}
dodajZastep();

document.getElementById("kategoria").addEventListener("change", function(){
    let opcje = {
        "P - Pożar": ["Małe","Średnie","Duże","Bardzo Duże"],
        "MZ - Miejscowe Zagrożenie": ["Małe","Lokalne","Średnie","Duże"],
        "AF - Alarm Fałszywy": ["W dobrej wierze","Z instalacji wykrywania","Złośliwy"]
    };

    let datalist = document.getElementById("wielkosc_list");
    datalist.innerHTML = "";

    if(opcje[this.value]){
        opcje[this.value].forEach(x=>{
            let option = document.createElement("option");
            option.value = x;
            datalist.appendChild(option);
        });
    }
    document.getElementById("wielkosc").value = "";
});

<script>
function wyslijRaport(){

    const webhookURL = "https://discord.com/api/webhooks/1477367444313083965/6-KlKbKvkI3bD-59HK_iLLP136qy0qr_dPzY48IqW_VSj0qmPBU2nKld2kc60vX7ySWa";

    let raport = `🚒 **NOWA KARTA ZDARZENIA**\n\n`;

    raport += `👨‍🚒 KDR: ${document.getElementById("kierujacy").value}\n`;
    raport += `📄 Uprawnienie: ${document.getElementById("uprawnienie").value}\n`;
    raport += `📂 Kategoria: ${document.getElementById("kategoria").value}\n`;
    raport += `📏 Wielkość: ${document.getElementById("wielkosc").value}\n`;
    raport += `📍 Lokalizacja: ${document.getElementById("lokalizacja").value}\n`;
    raport += `⏰ Przybycie: ${document.getElementById("godzina_przybycia").value}\n`;
    raport += `⏱ Zakończenie: ${document.getElementById("godzina_zakonczenia").value}\n`;
    raport += `🚒 SiŚ: ${document.getElementById("zadisponowane_sis").value}\n`;
    raport += `📝 Opis: ${document.getElementById("opis").value}\n`;
    raport += `✍ Sporządził: ${document.getElementById("sporządzajacy_notatke").value}\n\n`;

    let zastepy = document.querySelectorAll(".zastep-box");

    zastepy.forEach((box, i) => {
        raport += `🚒 **Zastęp ${i+1}**\n`;
        raport += `Pojazd: ${box.querySelector(".pojazd").value}\n`;
        raport += `Kierowca: ${box.querySelector(".kierowca").value}\n`;
        raport += `Dowódca: ${box.querySelector(".dowodca").value}\n`;
        raport += `R1: ${box.querySelector(".r1").value}\n`;
        raport += `Pom. R1: ${box.querySelector(".pr1").value}\n`;
        raport += `R2: ${box.querySelector(".r2").value}\n`;
        raport += `Pom. R2: ${box.querySelector(".pr2").value}\n\n`;
    });

    fetch(webhookURL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            content: raport
        })
    })
    .then(response => {
        if(response.ok){
            alert("✅ Raport wysłany na Discorda");
        } else {
            alert("❌ Błąd wysyłania (sprawdź webhook)");
        }
    })
    .catch(error => {
        console.error(error);
        alert("❌ Błąd połączenia z Discordem");
    });
}
</script>
