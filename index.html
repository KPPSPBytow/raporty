<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>SKT Bytów – Karta IZZ</title>

<!-- Open Graph (ładna karta na Discordzie) -->
<meta property="og:title" content="Karta zdarzenia">
<meta property="og:description" content="System dokumentacji i meldunków działań ratowniczo-gaśniczych.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://kppsbytow.github.io/raporty/">
<meta property="og:image" content="https://kppsbytow.github.io/raporty/logo.png">
<meta name="theme-color" content="#c40000">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #c40000;
}

.section {
    background: #e6e6e6;
    border-left: 6px solid #c40000;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 8px;
}

label {
    font-weight: bold;
}

input, textarea {
    width: 100%;
    padding: 8px;
    margin: 6px 0 15px 0;
    border-radius: 5px;
    border: 1px solid #999;
}

textarea {
    resize: vertical;
}

button {
    background: #c40000;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #a00000;
}

.zastep-box {
    background: #dcdcdc;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 6px;
}
</style>
</head>

<body>

<h1>Karta Zdarzenia</h1>

<div class="section">
<label>Kierujący działaniami</label>
<input type="text" id="kierujacy">

<label>Wypełnianie KZ z uprawnienia</label>
<input type="text" id="uprawnienie">

<label>Kategoria zdarzenia</label>
<input type="text" id="kategoria">

<label>Wielkość zdarzenia</label>
<input type="text" id="wielkosc">
</div>

<div class="section">
<h3>Obsada zastępów PSP</h3>
<div id="zastepy"></div>
<button type="button" onclick="dodajZastep()">+ Dodaj kolejny zastęp</button>
</div>

<div class="section">
<label>Zadysponowane SiŚ</label>
<input type="text" id="zadisponowane_sis">

<label>Godzina przybycia</label>
<input type="time" id="godzina_przybycia">

<label>Godzina zakończenia</label>
<input type="time" id="godzina_zakonczenia">

<label>Lokalizacja</label>
<input type="text" id="lokalizacja">

<label>Opis zdarzenia</label>
<textarea id="opis" rows="4"></textarea>

<label>Sporządzający</label>
<input type="text" id="sporządzajacy_notatke">
</div>

<div style="text-align:center;">
<button onclick="wyslijRaport()">Wyślij raport</button>
</div>

<script>

function dodajZastep() {
    let container = document.getElementById("zastepy");
    let numer = document.querySelectorAll(".zastep-box").length + 1;

    let box = document.createElement("div");
    box.className = "zastep-box";

    box.innerHTML = `
<h4>Zastęp ${numer}</h4>

<label>Pojazd</label>
<input type="text" class="pojazd">

<label>Kierowca</label>
<input type="text" class="kierowca">

<label>Dowódca</label>
<input type="text" class="dowodca">

<label>R1</label>
<input type="text" class="r1">

<label>Pomocnik R1</label>
<input type="text" class="pr1">

<label>R2</label>
<input type="text" class="r2">

<label>Pomocnik R2</label>
<input type="text" class="pr2">
`;

    container.appendChild(box);
}

dodajZastep();

function wyslijRaport() {

    let webhook = "TU_WKLEJ_SWÓJ_WEBHOOK";

    let zastepy = document.querySelectorAll(".zastep-box");
    let obsadaTekst = "";

    zastepy.forEach((z,i) => {
        obsadaTekst += 
`🚒 Zastęp ${i+1}
Pojazd: ${z.querySelector(".pojazd").value || "Brak"}
Kierowca: ${z.querySelector(".kierowca").value || "Brak"}
Dowódca: ${z.querySelector(".dowodca").value || "Brak"}
R1: ${z.querySelector(".r1").value || "Brak"}
Pomocnik R1: ${z.querySelector(".pr1").value || "Brak"}
R2: ${z.querySelector(".r2").value || "Brak"}
Pomocnik R2: ${z.querySelector(".pr2").value || "Brak"}

`;
    });

    let embed = {
        author: {
            name: "SWD-ST KARTA IZZ"
        },
        title: "📋 Karta Zdarzenia",
        color: 3447003,
        description:
`🔴 Kierujący działaniami
${document.getElementById("kierujacy").value || "Brak"}

📂 Kategoria
${document.getElementById("kategoria").value || "Nie wybrano"}

📏 Wielkość
${document.getElementById("wielkosc").value || "Nie wybrano"}

👥 Obsada PSP
${obsadaTekst || "Brak"}

📍 Lokalizacja
${document.getElementById("lokalizacja").value || "Brak"}

⏱ Przybycie
${document.getElementById("godzina_przybycia").value || "Brak"}

⏱ Zakończenie
${document.getElementById("godzina_zakonczenia").value || "Brak"}

🚒 SiŚ
${document.getElementById("zadisponowane_sis").value || "Brak"}

📝 Opis
${document.getElementById("opis").value || "Brak"}

✍️ Sporządzający
${document.getElementById("sporządzajacy_notatke").value || "Brak"}
`,
        timestamp: new Date()
    };

    fetch(webhook, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ embeds: [embed] })
    })
    .then(() => alert("Raport wysłany!"))
    .catch(() => alert("Błąd wysyłania webhooka!"));
}

</script>

</body>
</html>
