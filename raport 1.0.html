<script>
// Funkcja dodająca zastęp
function dodajZastep() {
    let container = document.getElementById("zastepy");
    let numer = document.querySelectorAll(".zastep-box").length + 1;

    let box = document.createElement("div");
    box.className = "zastep-box";

    box.innerHTML = `
<h4>Zastęp ${numer}</h4>

<label>Pojazd</label>
<input type="text" class="pojazd">

<label>Kierowca</label>
<input type="text" class="kierowca" list="obsada_list">

<label>Dowódca</label>
<input type="text" class="dowodca" list="obsada_list">

<label>R1</label>
<input type="text" class="r1" list="obsada_list">

<label>Pomocnik R1</label>
<input type="text" class="pr1" list="obsada_list">

<label>R2</label>
<input type="text" class="r2" list="obsada_list">

<label>Pomocnik R2</label>
<input type="text" class="pr2" list="obsada_list">
`;
    container.appendChild(box);
}

dodajZastep();

// Wysyłanie raportu
function wyslijRaport() {
    let webhook = "https://discord.com/api/webhooks/1477258295499554878/hmliNuCJiAd3LuvQ4mKkl1h-zHAROSgBDDoRlemUAGqmnYtIlj831z8hAsdSmD8uQLzY";

    let opisZastepow = "";
    let zastepy = document.querySelectorAll(".zastep-box");

    zastepy.forEach((z,i) => {
        opisZastepow += `🚒 Zastęp ${i+1}
Pojazd: ${z.querySelector(".pojazd").value || "Brak"}
Kierowca: ${z.querySelector(".kierowca").value || "Brak"}
Dowódca: ${z.querySelector(".dowodca").value || "Brak"}
R1: ${z.querySelector(".r1").value || "Brak"}
Pomocnik R1: ${z.querySelector(".pr1").value || "Brak"}
R2: ${z.querySelector(".r2").value || "Brak"}
Pomocnik R2: ${z.querySelector(".pr2").value || "Brak"}

`;
    });

    let embed = {
        title: "🚒 KARTA ZDARZENIA",
        color: 16711680,
        fields: [
            { name: "Kierujący", value: document.getElementById("kierujacy").value || "Brak" },
            { name: "Uprawnienie", value: document.getElementById("uprawnienie").value || "Brak" },
            { name: "Kategoria", value: document.getElementById("kategoria").value || "Brak" },
            { name: "Wielkość", value: document.getElementById("wielkosc").value || "Brak" },
            { name: "Obsada zastępów", value: opisZastepow },
            { name: "Zadysponowane SiŚ", value: document.getElementById("zadisponowane_sis").value || "Brak" },
            { name: "Godzina przybycia pierwszego podmiotu", value: document.getElementById("godzina_przybycia").value || "Brak" },
            { name: "Godzina zakończenia działań ostatniego podmiotu", value: document.getElementById("godzina_zakonczenia").value || "Brak" },
            { name: "Lokalizacja", value: document.getElementById("lokalizacja").value || "Brak" },
            { name: "Opis zdarzenia", value: document.getElementById("opis").value || "Brak" },
            { name: "Sporządzający notatkę", value: document.getElementById("sporządzajacy_notatke").value || "Brak" }
        ],
        timestamp: new Date()
    };

    fetch(webhook, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ embeds: [embed] })
    });

    alert("Raport wysłany!");
}

// Dynamiczna zmiana opcji wielkości
document.getElementById("kategoria").addEventListener("input", function() {
    let wielkoscInput = document.getElementById("wielkosc");

    let newDatalist = document.createElement("datalist");
    newDatalist.id = "wielkosc_list_dynamic";

    switch(this.value) {
        case "P – Pożar":
            ["Mały","Średni","Duży","Bardzo duży"].forEach(opt => {
                let option = document.createElement("option");
                option.value = opt;
                newDatalist.appendChild(option);
            });
            break;
        case "MZ – Miejscowe Zagrożenie":
            ["Małe","Lokalne","Średnie","Duże"].forEach(opt => {
                let option = document.createElement("option");
                option.value = opt;
                newDatalist.appendChild(option);
            });
            break;
        case "AF – Alarm Fałszywy":
            ["Alarm złośliwy","Alarm w dobrej wierze","Alarm z instalacji wykrywania"].forEach(opt => {
                let option = document.createElement("option");
                option.value = opt;
                newDatalist.appendChild(option);
            });
            break;
        default:
            break;
    }

    if(document.getElementById("wielkosc_list_dynamic")) {
        document.getElementById("wielkosc_list_dynamic").remove();
    }
    document.body.appendChild(newDatalist);
    wielkoscInput.setAttribute("list", "wielkosc_list_dynamic");
});
</script>
